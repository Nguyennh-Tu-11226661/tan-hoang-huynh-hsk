{% load formatting %}
<article class="course-card h-100">
    <div class="course-visual level-{{ course.level|lower|slugify }}">
        {% if course.image %}<img src="{{ course.image.url }}" alt="Lớp {{ course.title }}" loading="lazy">{% endif %}
        <span>{{ course.level }}</span>
        <strong>汉语</strong>
        <em>学中文</em>
    </div>
    <div class="course-card-body">
        <div class="d-flex justify-content-between align-items-center mb-2">
            <span class="pill">{{ course.duration }}</span>
            <span class="small text-muted">{{ course.level }}</span>
        </div>
        <h3><a href="{{ course.get_absolute_url }}">{{ course.title }}</a></h3>
        <p>{{ course.short_description }}</p>
        <div class="course-meta">
            <span>👥 {{ course.class_size }}</span>
            <strong>{{ course.tuition|vnd }}</strong>
        </div>
        <a class="text-link" href="{{ course.get_absolute_url }}">Xem lộ trình <span>→</span></a>
    </div>
</article>
