services:
  - type: web
    name: tan-hoang-huynh-hsk
    runtime: python
    plan: free
    rootDir: tan-hoang-huynh-hsk
    buildCommand: bash build.sh
    startCommand: gunicorn config.wsgi:application
    healthCheckPath: /
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: tan-hoang-huynh-hsk-db
          property: connectionString
      - key: SECURE_SSL_REDIRECT
        value: "True"
      - key: ALLOWED_HOSTS
        value: "tanhoanghuynhhsk.com,www.tanhoanghuynhhsk.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://tanhoanghuynhhsk.com,https://www.tanhoanghuynhhsk.com"
      - key: SITE_URL
        value: "https://tanhoanghuynhhsk.com"
      - key: MEDIA_STORAGE
        value: "r2_worker"
      - key: R2_WORKER_UPLOAD_URL
        value: "https://tan-hoang-huynh-media-upload.nguyenanhtu1113.workers.dev"
      - key: R2_WORKER_AUTH_KEY
        sync: false
      - key: R2_PUBLIC_BASE_URL
        value: "https://pub-4b5875c37809410abf61733bb3fc4217.r2.dev"
      - key: AWS_LOCATION
        value: "media"
      - key: ADMIN_2FA_REQUIRED
        sync: false
      - key: ADMISSION_DATA_RETENTION_DAYS
        value: "365"

databases:
  - name: tan-hoang-huynh-hsk-db
    plan: free
