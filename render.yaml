services:
  - type: web
    name: tan-hoang-huynh-hsk
    runtime: python
    plan: free
    rootDir: tan-hoang-huynh-hsk
    buildCommand: bash build.sh
    startCommand: gunicorn config.wsgi:application
    healthCheckPath: /
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: tan-hoang-huynh-hsk-db
          property: connectionString
      - key: SECURE_SSL_REDIRECT
        value: "True"

databases:
  - name: tan-hoang-huynh-hsk-db
    plan: free
